<main class="change-password-page">
  <header class="page-header">
    <div>
      <h1>პაროლის შეცვლა</h1>
      <p>განაახლეთ თქვენი ანგარიშის პაროლი უსაფრთხოდ.</p>
    </div>
    <div class="header-actions">
      <button type="button" class="secondary" (click)="navigateBack()">უკან</button>
      <app-profile-menu />
    </div>
  </header>

  <section class="card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>მიმდინარე პაროლი</span>
        <input type="password" formControlName="oldPassword" />
        @if (form.controls.oldPassword.touched && form.controls.oldPassword.hasError('required')) {
          <small class="field-error">Current password is required.</small>
        }
      </label>

      <label>
        <span>ახალი პაროლი</span>
        <input type="password" formControlName="newPassword" />
        @if (form.controls.newPassword.touched && form.controls.newPassword.hasError('required')) {
          <small class="field-error">New password is required.</small>
        }
        @if (form.controls.newPassword.touched && form.controls.newPassword.hasError('minlength')) {
          <small class="field-error">New password must be at least 8 characters.</small>
        }
      </label>

      @if (successMessage()) {
        <p class="message success">{{ successMessage() }}</p>
      }

      @if (errorMessage()) {
        <p class="message error">{{ errorMessage() }}</p>
      }

      <button type="submit" class="primary" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'განახლება...' : 'პაროლის შეცვლა' }}
      </button>
    </form>
  </section>
</main>
